<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAH Forge Direct</title>
  <script src="/ai-polyfill.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --surface:  #17171b;
      --surface2: #1f1f25;
      --border:   #2e2e38;
      --accent:   #f97316;
      --accent2:  #fb923c;
      --text:     #e8e8ee;
      --muted:    #888898;
      --danger:   #ef4444;
      --green:    #22c55e;
      --radius:   10px;
      --mono:     'Fira Code', 'Cascadia Code', Consolas, monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; line-height: 1.6; }

    .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #c2410c);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 17px;
    }
    .brand-name { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .brand-name span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      background: rgba(249,115,22,.15); color: var(--accent2);
      border: 1px solid rgba(249,115,22,.3); letter-spacing: .4px;
    }
    #usage-bar { display: flex; gap: 14px; }
    .usage-stat { font-size: 11px; color: var(--muted); }
    .usage-stat strong { color: var(--text); }

    /* ── Layout ── */
    main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-top { padding: 12px 12px 0; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    /* Search */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; padding: 7px 10px 7px 30px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 7px; color: var(--text);
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }

    /* Filter chips */
    .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip {
      padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); transition: all .12s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { border-color: var(--accent); background: rgba(249,115,22,.12); color: var(--accent2); }

    /* Model count */
    .model-count { font-size: 11px; color: var(--muted); padding: 0 2px 6px; }

    /* Model list */
    .model-list-wrap { flex: 1; overflow-y: auto; padding: 0 6px 10px; }
    .model-list-wrap::-webkit-scrollbar { width: 4px; }
    .model-list-wrap::-webkit-scrollbar-track { background: transparent; }
    .model-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .model-group-label {
      padding: 8px 6px 4px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }

    .model-btn {
      display: flex; align-items: flex-start; gap: 8px; width: 100%;
      padding: 8px 8px; background: transparent;
      border: 1px solid transparent; border-radius: 7px; cursor: pointer;
      text-align: left; color: var(--text); font-family: inherit;
      transition: border-color .12s, background .12s; margin-bottom: 2px;
    }
    .model-btn:hover { background: var(--surface2); border-color: var(--border); }
    .model-btn.active { background: rgba(249,115,22,.1); border-color: var(--accent); }

    .model-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .model-info { flex: 1; min-width: 0; }
    .model-name {
      font-size: 12.5px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .model-sub { font-size: 10.5px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .model-price { font-variant-numeric: tabular-nums; }
    .model-ctx { }
    .free-tag { color: var(--green); font-weight: 600; }

    /* Loading / error */
    .list-status {
      padding: 24px 12px; text-align: center; font-size: 13px; color: var(--muted);
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sidebar params ── */
    .sidebar-params { flex-shrink: 0; padding: 10px 12px 12px; border-top: 1px solid var(--border); }
    .params-toggle {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .7px; color: var(--muted); cursor: pointer;
      padding-bottom: 8px; user-select: none;
    }
    .params-toggle .arrow { transition: transform .2s; }
    .params-toggle.open .arrow { transform: rotate(180deg); }
    .params-body { display: none; flex-direction: column; gap: 10px; }
    .params-body.open { display: flex; }

    .param-row label {
      display: flex; justify-content: space-between; font-size: 12px;
      color: var(--muted); margin-bottom: 4px;
    }
    .param-row label span { color: var(--text); font-weight: 500; }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 3px;
      border-radius: 4px; background: var(--border); outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .toggle { position: relative; width: 34px; height: 19px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 20px; cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute; left: 3px; top: 3px;
      width: 13px; height: 13px; background: #fff; border-radius: 50%; transition: transform .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(15px); }

    /* ── Workspace ── */
    .workspace { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }

    .output-area { overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
    .output-area::-webkit-scrollbar { width: 5px; }
    .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--muted); text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 44px; }
    .empty-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 13px; max-width: 300px; }

    /* Messages */
    .message { display: flex; gap: 11px; animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .message.user { justify-content: flex-end; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; background: var(--surface2); border: 1px solid var(--border);
    }
    .msg-avatar.ai {
      background: linear-gradient(135deg, var(--accent), #c2410c);
      border-color: transparent; color: #fff;
    }

    .msg-body { max-width: 700px; min-width: 0; }
    .msg-meta {
      font-size: 10.5px; color: var(--muted); margin-bottom: 3px;
      display: flex; align-items: center; gap: 7px;
    }
    .msg-model-tag {
      background: rgba(249,115,22,.15); color: var(--accent2);
      border-radius: 3px; padding: 1px 5px; font-size: 9.5px; font-weight: 600;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .msg-bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 15px; font-size: 14px;
      line-height: 1.7; word-break: break-word;
    }
    .message.user .msg-bubble {
      background: rgba(249,115,22,.09); border-color: rgba(249,115,22,.22);
    }
    .msg-bubble pre {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 11px; margin: 10px 0; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
    }
    .msg-bubble code:not(pre code) {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 5px; font-family: var(--mono); font-size: 12px; color: var(--accent2);
    }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-error .msg-bubble { border-color: var(--danger); background: rgba(239,68,68,.07); color: #fca5a5; }

    .cursor-blink {
      display: inline-block; width: 2px; height: 1em; background: var(--accent);
      margin-left: 2px; vertical-align: text-bottom; animation: blink .9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input dock ── */
    .input-dock {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 14px 20px 18px;
    }
    .input-row {
      display: flex; gap: 9px; align-items: flex-end;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px; transition: border-color .15s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #prompt {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
      resize: none; min-height: 22px; max-height: 180px; line-height: 1.5;
    }
    #prompt::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px; background: var(--accent); border: none;
      border-radius: 7px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background .13s, transform .09s;
      color: #fff; font-size: 15px;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); }
    .send-btn:active:not(:disabled) { transform: scale(.92); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; opacity: .6; }
    .input-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 7px; font-size: 11px; color: var(--muted);
    }
    .hint kbd {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: 10px;
    }
    .selected-model-label {
      font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px;
    }
    .selected-model-label strong { color: var(--accent2); font-weight: 500; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <a class="brand" href="#">
      <div class="brand-icon">🔥</div>
      <span class="brand-name">YAH <span>Forge</span> Direct</span>
    </a>
    <div class="header-right">
      <span class="badge">DIRECT API</span>
      <div id="usage-bar"></div>
    </div>
  </header>

  <main>
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="model-search" placeholder="Search models…" autocomplete="off" />
        </div>
        <div class="filter-row" id="filter-row">
          <span class="chip active" data-filter="all">All</span>
          <span class="chip" data-filter="free">Free</span>
          <span class="chip" data-filter="google">Google</span>
          <span class="chip" data-filter="anthropic">Anthropic</span>
          <span class="chip" data-filter="openai">OpenAI</span>
          <span class="chip" data-filter="meta-llama">Meta</span>
          <span class="chip" data-filter="mistralai">Mistral</span>
          <span class="chip" data-filter="deepseek">DeepSeek</span>
          <span class="chip" data-filter="qwen">Qwen</span>
          <span class="chip" data-filter="x-ai">xAI</span>
        </div>
        <div class="model-count" id="model-count"></div>
      </div>

      <div class="model-list-wrap" id="model-list">
        <div class="list-status"><span class="spinner"></span> Loading models…</div>
      </div>

      <!-- Parameters collapsible -->
      <div class="sidebar-params">
        <div class="params-toggle" id="params-toggle">
          Parameters <span class="arrow">▾</span>
        </div>
        <div class="params-body" id="params-body">
          <div class="param-row">
            <label>Temperature <span id="temp-val">0.8</span></label>
            <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.8" />
          </div>
          <div class="param-row">
            <label>Max tokens <span id="tokens-val">2,048</span></label>
            <input type="range" id="max-tokens" min="256" max="8192" step="256" value="2048" />
          </div>
          <div class="toggle-row">
            <span>Streaming</span>
            <label class="toggle">
              <input type="checkbox" id="streaming" checked />
              <span class="toggle-track"></span>
            </label>
          </div>
          <button id="clear-btn" style="
            padding: 7px; font-size: 12px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: var(--radius);
            color: var(--muted); cursor: pointer; font-family: inherit; width: 100%;
            transition: border-color .13s, color .13s;
          " onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'"
             onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            Clear conversation
          </button>
        </div>
      </div>
    </aside>

    <!-- ── Workspace ── -->
    <div class="workspace">
      <div class="output-area" id="output">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⚒️</div>
          <div class="empty-title">Ready to forge</div>
          <div class="empty-sub">Pick a model on the left, type a prompt, and hit Send</div>
        </div>
      </div>

      <div class="input-dock">
        <div class="input-row">
          <textarea id="prompt" rows="1" placeholder="Type a prompt…"></textarea>
          <button class="send-btn" id="send-btn" title="Send (Ctrl+Enter)">➤</button>
        </div>
        <div class="input-footer">
          <span class="hint"><kbd>Ctrl+Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</span>
          <span class="selected-model-label">
            Model: <strong id="active-model-label">none selected</strong>
          </span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict';

  const OR_MODELS_URL = 'https://openrouter.ai/api/v1/models';

  // Fallback list if fetch fails
  const FALLBACK_MODELS = [
    { id: 'google/gemini-2.5-pro',       name: 'Gemini 2.5 Pro',         provider: 'google' },
    { id: 'google/gemini-2.5-flash',      name: 'Gemini 2.5 Flash',       provider: 'google' },
    { id: 'anthropic/claude-opus-4',      name: 'Claude Opus 4',          provider: 'anthropic' },
    { id: 'anthropic/claude-sonnet-4',    name: 'Claude Sonnet 4',        provider: 'anthropic' },
    { id: 'openai/gpt-4.1',              name: 'GPT-4.1',                provider: 'openai' },
    { id: 'openai/gpt-4.1-mini',         name: 'GPT-4.1 Mini',           provider: 'openai' },
    { id: 'meta-llama/llama-4-maverick',  name: 'Llama 4 Maverick',       provider: 'meta-llama' },
    { id: 'deepseek/deepseek-chat-v3-0324', name: 'DeepSeek V3',          provider: 'deepseek' },
    { id: 'x-ai/grok-3',                 name: 'Grok 3',                 provider: 'x-ai' },
    { id: 'mistralai/mistral-large-2411', name: 'Mistral Large',          provider: 'mistralai' },
  ].map(m => ({ ...m, promptPrice: null, completionPrice: null, contextLength: null }));

  // Provider → accent colour
  const PROVIDER_COLORS = {
    google:       '#4285f4',
    anthropic:    '#cc785c',
    openai:       '#10a37f',
    'meta-llama': '#0668e1',
    mistralai:    '#fa520f',
    deepseek:     '#2563eb',
    'x-ai':       '#e5e5e5',
    cohere:       '#39594d',
    qwen:         '#6366f1',
    '01-ai':      '#8b5cf6',
    nvidia:       '#76b900',
    microsoft:    '#00a4ef',
    amazon:       '#ff9900',
    perplexity:   '#20808d',
  };

  function providerColor(id) {
    const org = id.split('/')[0];
    return PROVIDER_COLORS[org] || '#888898';
  }

  function providerLabel(id) {
    const org = id.split('/')[0];
    const MAP = {
      google: 'Google', anthropic: 'Anthropic', openai: 'OpenAI',
      'meta-llama': 'Meta', mistralai: 'Mistral', deepseek: 'DeepSeek',
      'x-ai': 'xAI', cohere: 'Cohere', qwen: 'Qwen', '01-ai': '01.AI',
      nvidia: 'NVIDIA', microsoft: 'Microsoft', amazon: 'Amazon', perplexity: 'Perplexity',
    };
    return MAP[org] || org;
  }

  function formatCtx(n) {
    if (!n) return '';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(0) + 'M ctx';
    if (n >= 1_000)     return (n / 1_000).toFixed(0) + 'K ctx';
    return n + ' ctx';
  }

  function formatPrice(prompt, completion) {
    // prices are per token; convert to per 1M tokens
    const pIn  = parseFloat(prompt)     || 0;
    const pOut = parseFloat(completion) || 0;
    if (pIn === 0 && pOut === 0) return '<span class="free-tag">FREE</span>';
    const inStr  = pIn  === 0 ? '0' : (pIn  * 1e6).toFixed(2);
    const outStr = pOut === 0 ? '0' : (pOut * 1e6).toFixed(2);
    return `$${inStr}/$${outStr} /1M`;
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let allModels    = [];
  let selectedId   = null;
  let searchQuery  = '';
  let activeFilter = 'all';
  let totalIn = 0, totalOut = 0;
  let isStreaming  = false;
  let activeMsg    = null;

  // ── Fetch models ───────────────────────────────────────────────────────────
  async function loadModels() {
    try {
      const res = await fetch(OR_MODELS_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      allModels = (json.data || [])
        .filter(m => m.id && m.name)
        .map(m => ({
          id:              m.id,
          name:            m.name,
          provider:        m.id.split('/')[0],
          promptPrice:     m.pricing?.prompt     ?? null,
          completionPrice: m.pricing?.completion ?? null,
          contextLength:   m.context_length      ?? null,
          isFree:          parseFloat(m.pricing?.prompt || '1') === 0 &&
                           parseFloat(m.pricing?.completion || '1') === 0,
        }));
      // Sort: free first, then alphabetically by provider/name
      allModels.sort((a, b) => {
        if (a.isFree !== b.isFree) return a.isFree ? -1 : 1;
        return a.id.localeCompare(b.id);
      });
    } catch (err) {
      console.warn('OpenRouter model fetch failed, using fallback list:', err.message);
      allModels = FALLBACK_MODELS;
    }
    renderList();
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function getFiltered() {
    return allModels.filter(m => {
      const q = searchQuery.toLowerCase();
      const matchSearch = !q || m.id.toLowerCase().includes(q) || m.name.toLowerCase().includes(q);
      const matchFilter = activeFilter === 'all'  ? true
                        : activeFilter === 'free' ? m.isFree
                        : m.provider === activeFilter;
      return matchSearch && matchFilter;
    });
  }

  function renderList() {
    const list      = document.getElementById('model-list');
    const countEl   = document.getElementById('model-count');
    const filtered  = getFiltered();
    countEl.textContent = `${filtered.length.toLocaleString()} model${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="list-status" style="color:var(--muted)">No models match your search.</div>';
      return;
    }

    // Group by provider
    const groups = {};
    for (const m of filtered) {
      (groups[m.provider] = groups[m.provider] || []).push(m);
    }

    const frag = document.createDocumentFragment();
    for (const [prov, models] of Object.entries(groups)) {
      const label = document.createElement('div');
      label.className = 'model-group-label';
      label.textContent = providerLabel(prov);
      frag.appendChild(label);

      for (const m of models) {
        const btn = document.createElement('button');
        btn.className = 'model-btn' + (m.id === selectedId ? ' active' : '');
        btn.dataset.id = m.id;

        const priceHtml = (m.promptPrice !== null && m.completionPrice !== null)
          ? formatPrice(m.promptPrice, m.completionPrice)
          : '';
        const ctxHtml   = m.contextLength ? formatCtx(m.contextLength) : '';

        btn.innerHTML = `
          <span class="model-dot" style="background:${providerColor(m.id)}"></span>
          <span class="model-info">
            <span class="model-name" title="${m.id}">${m.name}</span>
            <span class="model-sub">
              ${priceHtml ? `<span class="model-price">${priceHtml}</span>` : ''}
              ${ctxHtml   ? `<span class="model-ctx">${ctxHtml}</span>`   : ''}
            </span>
          </span>`;

        btn.addEventListener('click', () => selectModel(m.id, m.name));
        frag.appendChild(btn);
      }
    }

    list.innerHTML = '';
    list.appendChild(frag);
  }

  function selectModel(id, name) {
    selectedId = id;
    document.getElementById('active-model-label').textContent = name || id;
    document.querySelectorAll('.model-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.id === id));
  }

  // ── Search & filter ────────────────────────────────────────────────────────
  document.getElementById('model-search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderList();
  });

  document.getElementById('filter-row').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    activeFilter = chip.dataset.filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
    renderList();
  });

  // ── Parameters ────────────────────────────────────────────────────────────
  const tempSlider   = document.getElementById('temperature');
  const tokensSlider = document.getElementById('max-tokens');
  tempSlider.addEventListener('input',   () => document.getElementById('temp-val').textContent   = tempSlider.value);
  tokensSlider.addEventListener('input', () => document.getElementById('tokens-val').textContent = Number(tokensSlider.value).toLocaleString());

  document.getElementById('params-toggle').addEventListener('click', function () {
    this.classList.toggle('open');
    document.getElementById('params-body').classList.toggle('open');
  });

  // ── Prompt textarea ────────────────────────────────────────────────────────
  const promptEl = document.getElementById('prompt');
  const sendBtn  = document.getElementById('send-btn');

  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 180) + 'px';
  });

  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Clear ─────────────────────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', () => {
    const out = document.getElementById('output');
    out.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state'; es.id = 'empty-state';
    es.innerHTML = `<div class="empty-icon">⚒️</div>
      <div class="empty-title">Ready to forge</div>
      <div class="empty-sub">Pick a model on the left, type a prompt, and hit Send</div>`;
    out.appendChild(es);
    totalIn = 0; totalOut = 0;
    document.getElementById('usage-bar').innerHTML = '';
  });

  // ── Poe handler ───────────────────────────────────────────────────────────
  window.Poe.registerHandler('forge', function (event) {
    const resp = event.responses[0];
    if (!activeMsg) return;
    const bubble   = activeMsg.querySelector('.msg-bubble');
    const cursorEl = activeMsg.querySelector('.cursor-blink');

    if (resp.status === 'error') {
      activeMsg.classList.add('msg-error');
      bubble.textContent = resp.statusText || 'An error occurred.';
      if (cursorEl) cursorEl.remove();
      activeMsg = null; setLoading(false); return;
    }

    bubble.innerHTML = renderMarkdown(resp.content);
    if (resp.status === 'incomplete') {
      const c = document.createElement('span');
      c.className = 'cursor-blink';
      bubble.appendChild(c);
    }
    if (resp.status === 'complete') {
      if (cursorEl) cursorEl.remove();
      activeMsg = null; setLoading(false);
    }
    const out = document.getElementById('output');
    out.scrollTop = out.scrollHeight;
  });

  // ── Send ──────────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  function sendMessage() {
    const text = promptEl.value.trim();
    if (!text || isStreaming) return;
    if (!selectedId) {
      alert('Please select a model from the sidebar first.');
      return;
    }

    const es = document.getElementById('empty-state');
    if (es) es.remove();

    const stream      = document.getElementById('streaming').checked;
    const temperature = parseFloat(tempSlider.value);
    const max_tokens  = parseInt(tokensSlider.value, 10);

    appendMessage('user', text, null);
    activeMsg = appendMessage('ai', '', selectedId);

    promptEl.value = ''; promptEl.style.height = 'auto';
    setLoading(true);

    // Use the full model ID in the @prefix (polyfill now supports slashes)
    const query = `@${selectedId} ${text}`;

    window.Poe.sendUserMessage(query, {
      handler: 'forge', stream, parameters: { temperature, max_tokens },
    }).catch(err => {
      if (activeMsg) {
        activeMsg.classList.add('msg-error');
        activeMsg.querySelector('.msg-bubble').textContent = err.message || 'Request failed.';
        const c = activeMsg.querySelector('.cursor-blink');
        if (c) c.remove();
        activeMsg = null; setLoading(false);
      }
    });
  }

  function appendMessage(role, content, modelId) {
    const out  = document.getElementById('output');
    const div  = document.createElement('div');
    div.className = `message ${role}`;
    const modelName = modelId
      ? (allModels.find(m => m.id === modelId)?.name || modelId)
      : '';
    const modelTag = modelName ? `<span class="msg-model-tag" title="${modelId}">${modelName}</span>` : '';

    div.innerHTML = role === 'ai'
      ? `<div class="msg-avatar ai">🔥</div>
         <div class="msg-body">
           <span class="msg-meta">${modelTag} AI · just now</span>
           <div class="msg-bubble">${renderMarkdown(content)}<span class="cursor-blink"></span></div>
         </div>`
      : `<div class="msg-body" style="text-align:right">
           <span class="msg-meta" style="justify-content:flex-end">You · just now</span>
           <div class="msg-bubble">${escapeHtml(content)}</div>
         </div>
         <div class="msg-avatar">U</div>`;

    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
    return div;
  }

  function setLoading(val) {
    isStreaming = val;
    sendBtn.disabled = val;
    sendBtn.textContent = val ? '⏳' : '➤';
  }

  // ── Markdown ──────────────────────────────────────────────────────────────
  function renderMarkdown(text) {
    if (!text) return '';
    let h = escapeHtml(text);
    h = h.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
    h = h.replace(/`([^`\n]+)`/g,              '<code>$1</code>');
    h = h.replace(/\*\*(.+?)\*\*/g,            '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g,                '<em>$1</em>');
    h = h.replace(/^### (.+)$/gm,              '<strong>$1</strong>');
    h = h.replace(/^## (.+)$/gm,               '<strong style="font-size:1.05em">$1</strong>');
    h = h.replace(/^# (.+)$/gm,                '<strong style="font-size:1.1em">$1</strong>');
    h = h.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return h;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadModels();
})();
</script>
</body>
</html>
